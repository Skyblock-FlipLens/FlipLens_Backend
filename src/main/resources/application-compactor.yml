spring:
  main:
    web-application-type: none
  datasource:
    hikari:
      connection-timeout: ${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:5000}

config:
  hypixel:
    adaptive:
      enabled: false
  snapshot:
    retention:
      raw-compaction-enabled: false

instrumentation:
  jfr:
    enabled: false
