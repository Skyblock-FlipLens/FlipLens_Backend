spring:
  main:
    web-application-type: none
  datasource:
    hikari:
      connection-timeout: ${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:5000}
  flyway:
    enabled: false

config:
  hypixel:
    adaptive:
      enabled: false
  snapshot:
    retention:
      raw-compaction-enabled: false
      aggregate-cleanup-interval-ms: ${CONFIG_SNAPSHOT_RETENTION_AGGREGATE_CLEANUP_INTERVAL_MS:300000}
    rollup:
      enabled: ${CONFIG_SNAPSHOT_ROLLUP_ENABLED:true}
      materialization-interval-ms: ${CONFIG_SNAPSHOT_ROLLUP_MATERIALIZATION_INTERVAL_MS:30000}
      materialization-initial-delay-ms: ${CONFIG_SNAPSHOT_ROLLUP_MATERIALIZATION_INITIAL_DELAY_MS:10000}
      raw-retention-days: ${CONFIG_SNAPSHOT_ROLLUP_RAW_RETENTION_DAYS:7}
      test-raw-retention-days: ${CONFIG_SNAPSHOT_ROLLUP_TEST_RAW_RETENTION_DAYS:1}
      max-buckets-per-run: ${CONFIG_SNAPSHOT_ROLLUP_MAX_BUCKETS_PER_RUN:256}
      min-daily-rollup-distinct-coverage-ratio: ${CONFIG_SNAPSHOT_ROLLUP_MIN_DAILY_DISTINCT_COVERAGE_RATIO:0.90}
    partitioning:
      enabled: ${CONFIG_SNAPSHOT_PARTITIONING_ENABLED:true}
      dry-run: ${CONFIG_SNAPSHOT_PARTITIONING_DRY_RUN:false}
      market-snapshot-retention-days: ${CONFIG_SNAPSHOT_PARTITIONING_MARKET_RETENTION_DAYS:${CONFIG_SNAPSHOT_ROLLUP_TEST_RAW_RETENTION_DAYS:1}}
      ah-snapshot-retention-days: ${CONFIG_SNAPSHOT_PARTITIONING_AH_RETENTION_DAYS:${CONFIG_SNAPSHOT_ROLLUP_TEST_RAW_RETENTION_DAYS:1}}
      bz-snapshot-retention-days: ${CONFIG_SNAPSHOT_PARTITIONING_BZ_RETENTION_DAYS:${CONFIG_SNAPSHOT_ROLLUP_TEST_RAW_RETENTION_DAYS:1}}
  compaction:
    scheduler:
      api-readiness:
        url: ${CONFIG_COMPACTION_SCHEDULER_API_READINESS_URL:http://api:1881/actuator/compactionReadiness}
        allowed-hosts: ${CONFIG_COMPACTION_SCHEDULER_API_READINESS_ALLOWED_HOSTS:api,skyblockflipper-api,localhost,127.0.0.1,::1}

diagnostics:
  enabled: ${DIAGNOSTICS_ENABLED:true}
  interval: ${DIAGNOSTICS_INTERVAL:60s}
  api:
    base-url: ${DIAGNOSTICS_API_BASE_URL:http://api:1881}
  db:
    enabled: ${DIAGNOSTICS_DB_ENABLED:true}
    statement-timeout: ${DIAGNOSTICS_DB_STATEMENT_TIMEOUT:2s}
  output:
    enabled: ${DIAGNOSTICS_OUTPUT_ENABLED:false}
    file: ${DIAGNOSTICS_OUTPUT_FILE:var/profiling/diagnostics/compactor-diagnostics.jsonl}

instrumentation:
  jfr:
    enabled: false
