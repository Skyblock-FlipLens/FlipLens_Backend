spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://db:5432/skyblock}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate.default_batch_fetch_size: ${SPRING_JPA_HIBERNATE_DEFAULT_BATCH_FETCH_SIZE:50}
      hibernate.jdbc.batch_size: ${SPRING_JPA_HIBERNATE_JDBC_BATCH_SIZE:100}
      hibernate.order_inserts: ${SPRING_JPA_HIBERNATE_ORDER_INSERTS:true}

  flyway:
    enabled: true
    locations: classpath:db/migration,classpath:com/skyblockflipper/backend/db/migration
    validate-on-migrate: true
    baseline-on-migrate: ${FLYWAY_BASELINE_ON_MIGRATE:false}

server:
  port: ${SERVER_PORT:1880}

logging:
  file:
    path: ${LOGGING_FILE_PATH:var/log}

flipping:
  auction-model-v2-enabled: ${FLIPPING_AUCTION_MODEL_V2_ENABLED:true}
  selltime-model-enabled: ${FLIPPING_SELLTIME_MODEL_ENABLED:false}
  scoring-v2-enabled: ${FLIPPING_SCORING_V2_ENABLED:true}
  election-penalty-softened: ${FLIPPING_ELECTION_PENALTY_SOFTENED:true}
  recommendation-gates-enabled: ${FLIPPING_RECOMMENDATION_GATES_ENABLED:false}
  min-recommendation-liquidity-score: ${FLIPPING_MIN_RECOMMENDATION_LIQUIDITY_SCORE:15}
  min-recommendation-expected-profit: ${FLIPPING_MIN_RECOMMENDATION_EXPECTED_PROFIT:0}
  min-confidence-score: ${FLIPPING_MIN_CONFIDENCE_SCORE:25}
  outlier-protection-enabled: ${FLIPPING_OUTLIER_PROTECTION_ENABLED:true}

config:
  flip:
    storage:
      dual-write-enabled: ${CONFIG_FLIP_STORAGE_DUAL_WRITE_ENABLED:true}
      read-from-new: ${CONFIG_FLIP_STORAGE_READ_FROM_NEW:true}
      legacy-write-enabled: ${CONFIG_FLIP_STORAGE_LEGACY_WRITE_ENABLED:false}
      trend-relative-threshold: ${CONFIG_FLIP_STORAGE_TREND_RELATIVE_THRESHOLD:0.05}
      trend-score-delta-threshold: ${CONFIG_FLIP_STORAGE_TREND_SCORE_DELTA_THRESHOLD:3.0}
      parity-sample-size: ${CONFIG_FLIP_STORAGE_PARITY_SAMPLE_SIZE:20}
  hypixel:
    api-url: ${CONFIG_HYPIXEL_API_URL:https://api.hypixel.net/v2}
    api-key: ${CONFIG_HYPIXEL_API_KEY:}
    connect-timeout: ${CONFIG_HYPIXEL_CONNECT_TIMEOUT:PT2S}
    request-timeout: ${CONFIG_HYPIXEL_REQUEST_TIMEOUT:PT8S}
    adaptive:
      enabled: ${CONFIG_HYPIXEL_ADAPTIVE_ENABLED:true}
      global-max-requests-per-second: ${CONFIG_HYPIXEL_ADAPTIVE_GLOBAL_MAX_RPS:3.0}
      auctions:
        name: auctions
        path: /skyblock/auctions
        period-hint: ${CONFIG_HYPIXEL_ADAPTIVE_AUCTIONS_PERIOD_HINT:PT20S}
        warmup-interval: ${CONFIG_HYPIXEL_ADAPTIVE_AUCTIONS_WARMUP_INTERVAL:PT2S}
        warmup-max-seconds: ${CONFIG_HYPIXEL_ADAPTIVE_AUCTIONS_WARMUP_MAX_SECONDS:90}
        guard-window-ms: ${CONFIG_HYPIXEL_ADAPTIVE_AUCTIONS_GUARD_WINDOW_MS:400}
        min-guard-window-ms: ${CONFIG_HYPIXEL_ADAPTIVE_AUCTIONS_MIN_GUARD_WINDOW_MS:250}
        max-guard-window-ms: ${CONFIG_HYPIXEL_ADAPTIVE_AUCTIONS_MAX_GUARD_WINDOW_MS:1200}
        burst-interval-ms: ${CONFIG_HYPIXEL_ADAPTIVE_AUCTIONS_BURST_INTERVAL_MS:400}
        burst-window-ms: ${CONFIG_HYPIXEL_ADAPTIVE_AUCTIONS_BURST_WINDOW_MS:2000}
        lead-time-ms: ${CONFIG_HYPIXEL_ADAPTIVE_AUCTIONS_LEAD_TIME_MS:1500}
        grace-window-ms: ${CONFIG_HYPIXEL_ADAPTIVE_AUCTIONS_GRACE_WINDOW_MS:3000}
        min-probe-interval-ms: ${CONFIG_HYPIXEL_ADAPTIVE_AUCTIONS_MIN_PROBE_INTERVAL_MS:800}
        max-probe-interval-ms: ${CONFIG_HYPIXEL_ADAPTIVE_AUCTIONS_MAX_PROBE_INTERVAL_MS:15000}
        jitter-ms: ${CONFIG_HYPIXEL_ADAPTIVE_AUCTIONS_JITTER_MS:200}
        backoff-interval: ${CONFIG_HYPIXEL_ADAPTIVE_AUCTIONS_BACKOFF_INTERVAL:PT2S}
        max-burst-rate: ${CONFIG_HYPIXEL_ADAPTIVE_AUCTIONS_MAX_BURST_RATE:2.0}
        request-timeout: ${CONFIG_HYPIXEL_ADAPTIVE_AUCTIONS_REQUEST_TIMEOUT:PT8S}
        connect-timeout: ${CONFIG_HYPIXEL_ADAPTIVE_AUCTIONS_CONNECT_TIMEOUT:PT2S}
        estimator-window-size: ${CONFIG_HYPIXEL_ADAPTIVE_AUCTIONS_ESTIMATOR_WINDOW_SIZE:7}
        ema-alpha: ${CONFIG_HYPIXEL_ADAPTIVE_AUCTIONS_EMA_ALPHA:0.25}
        min-period-multiplier: ${CONFIG_HYPIXEL_ADAPTIVE_AUCTIONS_MIN_PERIOD_MULTIPLIER:0.6}
        max-period-multiplier: ${CONFIG_HYPIXEL_ADAPTIVE_AUCTIONS_MAX_PERIOD_MULTIPLIER:1.8}
        transient-retries: ${CONFIG_HYPIXEL_ADAPTIVE_AUCTIONS_TRANSIENT_RETRIES:2}
      bazaar:
        name: bazaar
        path: /skyblock/bazaar
        period-hint: ${CONFIG_HYPIXEL_ADAPTIVE_BAZAAR_PERIOD_HINT:PT60S}
        warmup-interval: ${CONFIG_HYPIXEL_ADAPTIVE_BAZAAR_WARMUP_INTERVAL:PT2S}
        warmup-max-seconds: ${CONFIG_HYPIXEL_ADAPTIVE_BAZAAR_WARMUP_MAX_SECONDS:90}
        guard-window-ms: ${CONFIG_HYPIXEL_ADAPTIVE_BAZAAR_GUARD_WINDOW_MS:400}
        min-guard-window-ms: ${CONFIG_HYPIXEL_ADAPTIVE_BAZAAR_MIN_GUARD_WINDOW_MS:250}
        max-guard-window-ms: ${CONFIG_HYPIXEL_ADAPTIVE_BAZAAR_MAX_GUARD_WINDOW_MS:1200}
        burst-interval-ms: ${CONFIG_HYPIXEL_ADAPTIVE_BAZAAR_BURST_INTERVAL_MS:500}
        burst-window-ms: ${CONFIG_HYPIXEL_ADAPTIVE_BAZAAR_BURST_WINDOW_MS:2500}
        lead-time-ms: ${CONFIG_HYPIXEL_ADAPTIVE_BAZAAR_LEAD_TIME_MS:2000}
        grace-window-ms: ${CONFIG_HYPIXEL_ADAPTIVE_BAZAAR_GRACE_WINDOW_MS:8000}
        min-probe-interval-ms: ${CONFIG_HYPIXEL_ADAPTIVE_BAZAAR_MIN_PROBE_INTERVAL_MS:1000}
        max-probe-interval-ms: ${CONFIG_HYPIXEL_ADAPTIVE_BAZAAR_MAX_PROBE_INTERVAL_MS:15000}
        jitter-ms: ${CONFIG_HYPIXEL_ADAPTIVE_BAZAAR_JITTER_MS:200}
        backoff-interval: ${CONFIG_HYPIXEL_ADAPTIVE_BAZAAR_BACKOFF_INTERVAL:PT2S}
        max-burst-rate: ${CONFIG_HYPIXEL_ADAPTIVE_BAZAAR_MAX_BURST_RATE:2.0}
        request-timeout: ${CONFIG_HYPIXEL_ADAPTIVE_BAZAAR_REQUEST_TIMEOUT:PT8S}
        connect-timeout: ${CONFIG_HYPIXEL_ADAPTIVE_BAZAAR_CONNECT_TIMEOUT:PT2S}
        estimator-window-size: ${CONFIG_HYPIXEL_ADAPTIVE_BAZAAR_ESTIMATOR_WINDOW_SIZE:7}
        ema-alpha: ${CONFIG_HYPIXEL_ADAPTIVE_BAZAAR_EMA_ALPHA:0.25}
        min-period-multiplier: ${CONFIG_HYPIXEL_ADAPTIVE_BAZAAR_MIN_PERIOD_MULTIPLIER:0.6}
        max-period-multiplier: ${CONFIG_HYPIXEL_ADAPTIVE_BAZAAR_MAX_PERIOD_MULTIPLIER:1.8}
        transient-retries: ${CONFIG_HYPIXEL_ADAPTIVE_BAZAAR_TRANSIENT_RETRIES:2}
      pipeline:
        queue-capacity: ${CONFIG_HYPIXEL_ADAPTIVE_PIPELINE_QUEUE_CAPACITY:1}
        coalesce-enabled: ${CONFIG_HYPIXEL_ADAPTIVE_PIPELINE_COALESCE_ENABLED:true}
      debug:
        log-phase-transitions: ${CONFIG_HYPIXEL_ADAPTIVE_DEBUG_LOG_PHASE_TRANSITIONS:false}
        log-last-updated: ${CONFIG_HYPIXEL_ADAPTIVE_DEBUG_LOG_LAST_UPDATED:false}
        log-commit-stats: ${CONFIG_HYPIXEL_ADAPTIVE_DEBUG_LOG_COMMIT_STATS:false}
    polling:
      election-max-age: ${CONFIG_HYPIXEL_POLL_ELECTION_MAX_AGE:PT124H}
      election-refresh-interval-ms: ${CONFIG_HYPIXEL_POLL_ELECTION_REFRESH_INTERVAL_MS:300000}
      election-refresh-initial-delay-ms: ${CONFIG_HYPIXEL_POLL_ELECTION_REFRESH_INITIAL_DELAY_MS:60000}
      auctions-base-interval: ${CONFIG_HYPIXEL_POLL_AUCTIONS_BASE_INTERVAL:PT60S}
      bazaar-base-interval: ${CONFIG_HYPIXEL_POLL_BAZAAR_BASE_INTERVAL:PT20S}
      max-interval-multiplier: ${CONFIG_HYPIXEL_POLL_MAX_INTERVAL_MULTIPLIER:2}
      retry-interval: ${CONFIG_HYPIXEL_POLL_RETRY_INTERVAL:PT10S}
  NEU:
    repo-url: ${CONFIG_NEU_REPO_URL:https://github.com/NotEnoughUpdates/NotEnoughUpdates-REPO}
    refresh-days: ${CONFIG_NEU_REFRESH_DAYS:1}
  snapshot:
    storage:
      persist-raw-market-snapshot: ${CONFIG_SNAPSHOT_STORAGE_PERSIST_RAW_MARKET_SNAPSHOT:true}
      persist-ah-aggregates: ${CONFIG_SNAPSHOT_STORAGE_PERSIST_AH_AGGREGATES:true}
      persist-bz-aggregates: ${CONFIG_SNAPSHOT_STORAGE_PERSIST_BZ_AGGREGATES:true}
      aggregate-batch-size: ${CONFIG_SNAPSHOT_STORAGE_AGGREGATE_BATCH_SIZE:500}
    retention:
      # Default off in API instances; enable explicitly only where raw scheduler is intended.
      raw-compaction-enabled: ${CONFIG_SNAPSHOT_RETENTION_RAW_COMPACTION_ENABLED:false}
      raw-window-seconds: ${CONFIG_SNAPSHOT_RETENTION_RAW_WINDOW_SECONDS:90}
      minute-tier-upper-seconds: ${CONFIG_SNAPSHOT_RETENTION_MINUTE_TIER_UPPER_SECONDS:1800}
      two-hour-tier-upper-seconds: ${CONFIG_SNAPSHOT_RETENTION_TWO_HOUR_TIER_UPPER_SECONDS:43200}
      minute-interval-seconds: ${CONFIG_SNAPSHOT_RETENTION_MINUTE_INTERVAL_SECONDS:60}
      two-hour-interval-seconds: ${CONFIG_SNAPSHOT_RETENTION_TWO_HOUR_INTERVAL_SECONDS:7200}
      compaction-candidate-batch-size: ${CONFIG_SNAPSHOT_RETENTION_COMPACTION_CANDIDATE_BATCH_SIZE:500}
      flip-delete-batch-size: ${CONFIG_SNAPSHOT_RETENTION_FLIP_DELETE_BATCH_SIZE:100}
      # Small default pause smooths orphan-delete pressure without materially slowing compaction.
      flip-delete-batch-pause-millis: ${CONFIG_SNAPSHOT_RETENTION_FLIP_DELETE_BATCH_PAUSE_MILLIS:10}
      compaction-interval-ms: ${CONFIG_SNAPSHOT_RETENTION_COMPACTION_INTERVAL_MS:60000}
      compaction-initial-delay-ms: ${CONFIG_SNAPSHOT_RETENTION_COMPACTION_INITIAL_DELAY_MS:60000}
      ah-aggregate-days: ${CONFIG_SNAPSHOT_RETENTION_AH_AGGREGATE_DAYS:30}
      bz-aggregate-days: ${CONFIG_SNAPSHOT_RETENTION_BZ_AGGREGATE_DAYS:30}
      aggregate-cleanup-interval-ms: ${CONFIG_SNAPSHOT_RETENTION_AGGREGATE_CLEANUP_INTERVAL_MS:3600000}
    rollup:
      enabled: ${CONFIG_SNAPSHOT_ROLLUP_ENABLED:true}
      watermark-seconds: ${CONFIG_SNAPSHOT_ROLLUP_WATERMARK_SECONDS:30}
      materialization-interval-ms: ${CONFIG_SNAPSHOT_ROLLUP_MATERIALIZATION_INTERVAL_MS:60000}
      materialization-initial-delay-ms: ${CONFIG_SNAPSHOT_ROLLUP_MATERIALIZATION_INITIAL_DELAY_MS:15000}
      raw-retention-days: ${CONFIG_SNAPSHOT_ROLLUP_RAW_RETENTION_DAYS:7}
      test-raw-retention-days: ${CONFIG_SNAPSHOT_ROLLUP_TEST_RAW_RETENTION_DAYS:1}
      max-buckets-per-run: ${CONFIG_SNAPSHOT_ROLLUP_MAX_BUCKETS_PER_RUN:128}
      min-daily-rollup-distinct-coverage-ratio: ${CONFIG_SNAPSHOT_ROLLUP_MIN_DAILY_DISTINCT_COVERAGE_RATIO:0.90}
      anomaly:
        enabled: ${CONFIG_SNAPSHOT_ROLLUP_ANOMALY_ENABLED:true}
        min-valid-samples-1m: ${CONFIG_SNAPSHOT_ROLLUP_ANOMALY_MIN_VALID_SAMPLES_1M:3}
        min-valid-samples-2h: ${CONFIG_SNAPSHOT_ROLLUP_ANOMALY_MIN_VALID_SAMPLES_2H:4}
        min-valid-samples-1d: ${CONFIG_SNAPSHOT_ROLLUP_ANOMALY_MIN_VALID_SAMPLES_1D:2}
        min-bucket-coverage-ratio: ${CONFIG_SNAPSHOT_ROLLUP_ANOMALY_MIN_BUCKET_COVERAGE_RATIO:0.35}
        z-threshold: ${CONFIG_SNAPSHOT_ROLLUP_ANOMALY_Z_THRESHOLD:6.0}
        bazaar-relative-price-floor: ${CONFIG_SNAPSHOT_ROLLUP_ANOMALY_BAZAAR_RELATIVE_PRICE_FLOOR:0.08}
        ah-relative-price-floor: ${CONFIG_SNAPSHOT_ROLLUP_ANOMALY_AH_RELATIVE_PRICE_FLOOR:0.10}
        spread-multiplier-threshold: ${CONFIG_SNAPSHOT_ROLLUP_ANOMALY_SPREAD_MULTIPLIER_THRESHOLD:2.0}
        liquidity-drop-threshold: ${CONFIG_SNAPSHOT_ROLLUP_ANOMALY_LIQUIDITY_DROP_THRESHOLD:0.25}
        ah-bin-count-drop-threshold: ${CONFIG_SNAPSHOT_ROLLUP_ANOMALY_AH_BIN_COUNT_DROP_THRESHOLD:0.30}
        consecutive-samples-threshold: ${CONFIG_SNAPSHOT_ROLLUP_ANOMALY_CONSECUTIVE_SAMPLES_THRESHOLD:2}
        anomaly-duration-threshold-seconds: ${CONFIG_SNAPSHOT_ROLLUP_ANOMALY_DURATION_THRESHOLD_SECONDS:10}
        merge-gap-seconds: ${CONFIG_SNAPSHOT_ROLLUP_ANOMALY_MERGE_GAP_SECONDS:5}
        max-segments-per-item-per-bucket: ${CONFIG_SNAPSHOT_ROLLUP_ANOMALY_MAX_SEGMENTS_PER_ITEM_PER_BUCKET:1}
    partitioning:
      enabled: ${CONFIG_SNAPSHOT_PARTITIONING_ENABLED:false}
      mode: ${CONFIG_SNAPSHOT_PARTITIONING_MODE:PARTITION_DROP}
      dry-run: ${CONFIG_SNAPSHOT_PARTITIONING_DRY_RUN:true}
      fallback-to-row-delete: ${CONFIG_SNAPSHOT_PARTITIONING_FALLBACK_TO_ROW_DELETE:true}
      schema-name: ${CONFIG_SNAPSHOT_PARTITIONING_SCHEMA_NAME:public}
      maintenance-interval-ms: ${CONFIG_SNAPSHOT_PARTITIONING_MAINTENANCE_INTERVAL_MS:600000}
      precreate-days: ${CONFIG_SNAPSHOT_PARTITIONING_PRECREATE_DAYS:14}
      market-snapshot-parent-table: ${CONFIG_SNAPSHOT_PARTITIONING_MARKET_PARENT_TABLE:market_snapshot}
      market-snapshot-retention-days: ${CONFIG_SNAPSHOT_PARTITIONING_MARKET_RETENTION_DAYS:${CONFIG_SNAPSHOT_ROLLUP_RAW_RETENTION_DAYS:7}}
      ah-snapshot-parent-table: ${CONFIG_SNAPSHOT_PARTITIONING_AH_PARENT_TABLE:ah_item_snapshot}
      ah-snapshot-retention-days: ${CONFIG_SNAPSHOT_PARTITIONING_AH_RETENTION_DAYS:${CONFIG_SNAPSHOT_ROLLUP_RAW_RETENTION_DAYS:7}}
      bz-snapshot-parent-table: ${CONFIG_SNAPSHOT_PARTITIONING_BZ_PARENT_TABLE:bz_item_snapshot}
      bz-snapshot-retention-days: ${CONFIG_SNAPSHOT_PARTITIONING_BZ_RETENTION_DAYS:${CONFIG_SNAPSHOT_ROLLUP_RAW_RETENTION_DAYS:7}}
  compactor:
    channel: ${CONFIG_COMPACTOR_CHANNEL:compaction}
    safety-tick-interval-ms: ${CONFIG_COMPACTOR_SAFETY_TICK_INTERVAL_MS:60000}
    listen-poll-interval-ms: ${CONFIG_COMPACTOR_LISTEN_POLL_INTERVAL_MS:500}
    listen-reconnect-delay-ms: ${CONFIG_COMPACTOR_LISTEN_RECONNECT_DELAY_MS:2000}
    advisory-lock-key: ${CONFIG_COMPACTOR_ADVISORY_LOCK_KEY:912345678}
  compaction:
    readiness:
      enabled: ${CONFIG_COMPACTION_READINESS_ENABLED:true}
      api:
        max-p95-http-ms: ${CONFIG_COMPACTION_READINESS_API_MAX_P95_HTTP_MS:250}
        max-process-cpu: ${CONFIG_COMPACTION_READINESS_API_MAX_PROCESS_CPU:0.70}
        max-tomcat-busy-ratio: ${CONFIG_COMPACTION_READINESS_API_MAX_TOMCAT_BUSY_RATIO:0.70}
      db-pool:
        max-pending: ${CONFIG_COMPACTION_READINESS_DB_POOL_MAX_PENDING:0}
      pipeline:
        max-queue-size: ${CONFIG_COMPACTION_READINESS_PIPELINE_MAX_QUEUE_SIZE:0}
    scheduler:
      enabled: ${CONFIG_COMPACTION_SCHEDULER_ENABLED:true}
      decision-interval-seconds: ${CONFIG_COMPACTION_SCHEDULER_DECISION_INTERVAL_SECONDS:30}
      min-interval-seconds: ${CONFIG_COMPACTION_SCHEDULER_MIN_INTERVAL_SECONDS:30}
      fallback-interval-seconds: ${CONFIG_COMPACTION_SCHEDULER_FALLBACK_INTERVAL_SECONDS:60}
      api-readiness:
        enabled: ${CONFIG_COMPACTION_SCHEDULER_API_READINESS_ENABLED:true}
        url: ${CONFIG_COMPACTION_SCHEDULER_API_READINESS_URL:http://api:1881/actuator/compactionReadiness}
        allowed-hosts: ${CONFIG_COMPACTION_SCHEDULER_API_READINESS_ALLOWED_HOSTS:api,skyblockflipper-api,localhost,127.0.0.1,::1}
        connect-timeout-ms: ${CONFIG_COMPACTION_SCHEDULER_API_READINESS_CONNECT_TIMEOUT_MS:500}
        read-timeout-ms: ${CONFIG_COMPACTION_SCHEDULER_API_READINESS_READ_TIMEOUT_MS:1000}
      db-readiness:
        enabled: ${CONFIG_COMPACTION_SCHEDULER_DB_READINESS_ENABLED:true}
        max-active-sessions: ${CONFIG_COMPACTION_SCHEDULER_DB_READINESS_MAX_ACTIVE_SESSIONS:2}
        max-waiting-sessions: ${CONFIG_COMPACTION_SCHEDULER_DB_READINESS_MAX_WAITING_SESSIONS:1}
        max-lock-waits: ${CONFIG_COMPACTION_SCHEDULER_DB_READINESS_MAX_LOCK_WAITS:0}

management:
  server:
    address: ${MANAGEMENT_SERVER_ADDRESS:127.0.0.1}
    port: ${MANAGEMENT_SERVER_PORT:1881}
  endpoints:
    web:
      exposure:
        include: health,info,metrics,threaddump,prometheus,compactionReadiness,diagnostics,requestTimings,partitionDiagnostics
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.95,0.99

instrumentation:
  request-timings:
    enabled: ${INSTRUMENTATION_REQUEST_TIMINGS_ENABLED:true}
    interval: ${INSTRUMENTATION_REQUEST_TIMINGS_INTERVAL:60s}
    history-read-limit-max: ${INSTRUMENTATION_REQUEST_TIMINGS_HISTORY_READ_LIMIT_MAX:50}
    output:
      enabled: ${INSTRUMENTATION_REQUEST_TIMINGS_OUTPUT_ENABLED:true}
      file: ${INSTRUMENTATION_REQUEST_TIMINGS_OUTPUT_FILE:var/profiling/diagnostics/request-timings.jsonl}
      max-history-lines: ${INSTRUMENTATION_REQUEST_TIMINGS_OUTPUT_MAX_HISTORY_LINES:1440}
  jfr:
    enabled: ${INSTRUMENTATION_JFR_ENABLED:true}
    output-dir: ${INSTRUMENTATION_JFR_OUTPUT_DIR:var/profiling/jfr}
    retention: ${INSTRUMENTATION_JFR_RETENTION:PT2H}
    max-size-mb: ${INSTRUMENTATION_JFR_MAX_SIZE_MB:512}
    stack-depth: ${INSTRUMENTATION_JFR_STACK_DEPTH:256}
    snapshot-window: ${INSTRUMENTATION_JFR_SNAPSHOT_WINDOW:PT2M}
  blocking:
    slow-threshold-millis: ${INSTRUMENTATION_BLOCKING_SLOW_THRESHOLD_MILLIS:100}
    stack-sample-rate: ${INSTRUMENTATION_BLOCKING_STACK_SAMPLE_RATE:0.01}
    stack-log-rate-limit: ${INSTRUMENTATION_BLOCKING_STACK_LOG_RATE_LIMIT:PT30S}
  admin:
    local-only: ${INSTRUMENTATION_ADMIN_LOCAL_ONLY:true}
    token: ${INSTRUMENTATION_ADMIN_TOKEN:}
    # Optional CIDR allow-list when local-only=true, e.g. same /24 subnet.
    allowed-subnets: ${INSTRUMENTATION_ADMIN_ALLOWED_SUBNETS:}
  logs:
    enabled: ${INSTRUMENTATION_LOGS_ENABLED:true}
    file: ${INSTRUMENTATION_LOGS_FILE:}
    max-lines: ${INSTRUMENTATION_LOGS_MAX_LINES:500}
    max-read-bytes: ${INSTRUMENTATION_LOGS_MAX_READ_BYTES:1048576}
  async-profiler:
    enabled: ${INSTRUMENTATION_ASYNC_PROFILER_ENABLED:false}
    output-dir: ${INSTRUMENTATION_ASYNC_PROFILER_OUTPUT_DIR:var/profiling/async-profiler}
    script-path: ${INSTRUMENTATION_ASYNC_PROFILER_SCRIPT_PATH:scripts/run_async_profiler.sh}
