services:
  api:
    image: ${APP_IMAGE:-skyblockflipper-api:local}
    build:
      context: ${REPO_GIT_URL:-https://github.com/Skyblock-FlipLens/FlipLens_Backend.git}#${REPO_GIT_REF:-main}
      dockerfile: Dockerfile
    container_name: skyblockflipper-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://db:5432/skyblock}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-default}
      CONFIG_SNAPSHOT_RETENTION_RAW_COMPACTION_ENABLED: ${CONFIG_SNAPSHOT_RETENTION_RAW_COMPACTION_ENABLED:-false}
      FLYWAY_BASELINE_ON_MIGRATE: ${FLYWAY_BASELINE_ON_MIGRATE:-false}
      MANAGEMENT_SERVER_ADDRESS: ${MANAGEMENT_SERVER_ADDRESS:-0.0.0.0}
      MANAGEMENT_SERVER_PORT: ${MANAGEMENT_SERVER_PORT:-1881}
      SERVER_PORT: ${SERVER_PORT:-1880}
      JAVA_TOOL_OPTIONS: "${JAVA_TOOL_OPTIONS:--XX:InitialRAMPercentage=10 -XX:MaxRAMPercentage=75}"
    ports:
      - "${SERVER_PORT:-1880}:${SERVER_PORT:-1880}"
    mem_limit: 12g
    memswap_limit: 14g
    networks:
      - app_net
      - db_net

  compactor:
    image: ${APP_IMAGE:-skyblockflipper-api:local}
    container_name: skyblockflipper-compactor
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://db:5432/skyblock}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SPRING_PROFILES_ACTIVE: ${COMPACTOR_SPRING_PROFILES_ACTIVE:-compactor}
      FLYWAY_BASELINE_ON_MIGRATE: ${FLYWAY_BASELINE_ON_MIGRATE:-false}
      CONFIG_COMPACTION_SCHEDULER_API_READINESS_URL: ${CONFIG_COMPACTION_SCHEDULER_API_READINESS_URL:-http://api:1881/actuator/compactionReadiness}
      CONFIG_COMPACTION_SCHEDULER_API_READINESS_ALLOWED_HOSTS: ${CONFIG_COMPACTION_SCHEDULER_API_READINESS_ALLOWED_HOSTS:-api,skyblockflipper-api,localhost,127.0.0.1,::1}
      JAVA_TOOL_OPTIONS: "${COMPACTOR_JAVA_TOOL_OPTIONS:--XX:InitialRAMPercentage=10 -XX:MaxRAMPercentage=35}"
    mem_limit: 2g
    memswap_limit: 3g
    networks:
      - db_net

  db:
    image: postgres:16-alpine
    container_name: skyblockflipper-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-skyblock}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - db_net

volumes:
  postgres_data:

networks:
  app_net:
    driver: bridge
  db_net:
    driver: bridge
    internal: true
