services:
  api:
    image: ${APP_IMAGE:-skyblockflipper-api:local}
    build:
      context: ${REPO_GIT_URL:-https://github.com/Skyblock-FlipLens/FlipLens_Backend.git}#${REPO_GIT_REF:-main}
      dockerfile: Dockerfile
    container_name: skyblockflipper-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Database connection
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://db:5432/skyblock}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}

      # Spring profile and migration behavior
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-default}
      FLYWAY_BASELINE_ON_MIGRATE: ${FLYWAY_BASELINE_ON_MIGRATE:-false}

      # Server ports
      SERVER_PORT: ${SERVER_PORT:-1880}
      MANAGEMENT_SERVER_ADDRESS: ${MANAGEMENT_SERVER_ADDRESS:-0.0.0.0}
      MANAGEMENT_SERVER_PORT: ${MANAGEMENT_SERVER_PORT:-1881}

      # Runtime JVM options
      JAVA_TOOL_OPTIONS: "${JAVA_TOOL_OPTIONS:--XX:InitialRAMPercentage=10 -XX:MaxRAMPercentage=75}"

      # Hypixel API + adaptive polling
      CONFIG_HYPIXEL_API_KEY: ${CONFIG_HYPIXEL_API_KEY:-}
      CONFIG_HYPIXEL_ADAPTIVE_ENABLED: ${CONFIG_HYPIXEL_ADAPTIVE_ENABLED:-true}
      CONFIG_HYPIXEL_ADAPTIVE_PIPELINE_COALESCE_ENABLED: ${CONFIG_HYPIXEL_ADAPTIVE_PIPELINE_COALESCE_ENABLED:-false}
      CONFIG_HYPIXEL_ADAPTIVE_PIPELINE_QUEUE_CAPACITY: ${CONFIG_HYPIXEL_ADAPTIVE_PIPELINE_QUEUE_CAPACITY:-16}

      # Snapshot persistence outputs
      CONFIG_SNAPSHOT_STORAGE_PERSIST_RAW_MARKET_SNAPSHOT: ${CONFIG_SNAPSHOT_STORAGE_PERSIST_RAW_MARKET_SNAPSHOT:-true}
      CONFIG_SNAPSHOT_STORAGE_PERSIST_AH_AGGREGATES: ${CONFIG_SNAPSHOT_STORAGE_PERSIST_AH_AGGREGATES:-true}
      CONFIG_SNAPSHOT_STORAGE_PERSIST_BZ_AGGREGATES: ${CONFIG_SNAPSHOT_STORAGE_PERSIST_BZ_AGGREGATES:-true}
      CONFIG_SNAPSHOT_RETENTION_RAW_COMPACTION_ENABLED: ${CONFIG_SNAPSHOT_RETENTION_RAW_COMPACTION_ENABLED:-false}

      # Adaptive debug visibility
      CONFIG_HYPIXEL_ADAPTIVE_DEBUG_LOG_COMMIT_STATS: ${CONFIG_HYPIXEL_ADAPTIVE_DEBUG_LOG_COMMIT_STATS:-false}
      CONFIG_HYPIXEL_ADAPTIVE_DEBUG_LOG_LAST_UPDATED: ${CONFIG_HYPIXEL_ADAPTIVE_DEBUG_LOG_LAST_UPDATED:-false}
      CONFIG_HYPIXEL_ADAPTIVE_DEBUG_LOG_PHASE_TRANSITIONS: ${CONFIG_HYPIXEL_ADAPTIVE_DEBUG_LOG_PHASE_TRANSITIONS:-false}

      # Polling/Hypixel package log levels
      LOGGING_LEVEL_COM_SKYBLOCKFLIPPER_BACKEND_HYPIXEL: ${LOGGING_LEVEL_COM_SKYBLOCKFLIPPER_BACKEND_HYPIXEL:-INFO}
      LOGGING_LEVEL_COM_SKYBLOCKFLIPPER_BACKEND_SERVICE_MARKET_POLLING: ${LOGGING_LEVEL_COM_SKYBLOCKFLIPPER_BACKEND_SERVICE_MARKET_POLLING:-INFO}
    ports:
      - "${SERVER_PORT:-1880}:${SERVER_PORT:-1880}"
      - "${MANAGEMENT_SERVER_PORT:-1881}:${MANAGEMENT_SERVER_PORT:-1881}"
    mem_limit: 12g
    memswap_limit: 14g
    networks:
      - app_net
      - db_net

  compactor:
    image: ${APP_IMAGE:-skyblockflipper-api:local}
    container_name: skyblockflipper-compactor
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Compactor DB connection/profile
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://db:5432/skyblock}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SPRING_PROFILES_ACTIVE: ${COMPACTOR_SPRING_PROFILES_ACTIVE:-compactor}

      # Compactor scheduler integration
      CONFIG_COMPACTION_SCHEDULER_API_READINESS_URL: ${CONFIG_COMPACTION_SCHEDULER_API_READINESS_URL:-http://api:1881/actuator/compactionReadiness}
      CONFIG_COMPACTION_SCHEDULER_API_READINESS_ALLOWED_HOSTS: ${CONFIG_COMPACTION_SCHEDULER_API_READINESS_ALLOWED_HOSTS:-api,skyblockflipper-api,localhost,127.0.0.1,::1}

      # Compactor delete batching
      CONFIG_SNAPSHOT_RETENTION_FLIP_DELETE_BATCH_SIZE: ${CONFIG_SNAPSHOT_RETENTION_FLIP_DELETE_BATCH_SIZE:-250}
      CONFIG_SNAPSHOT_RETENTION_FLIP_DELETE_BATCH_PAUSE_MILLIS: ${CONFIG_SNAPSHOT_RETENTION_FLIP_DELETE_BATCH_PAUSE_MILLIS:-25}

      # Compactor runtime/migration
      FLYWAY_BASELINE_ON_MIGRATE: ${FLYWAY_BASELINE_ON_MIGRATE:-false}
      JAVA_TOOL_OPTIONS: "${COMPACTOR_JAVA_TOOL_OPTIONS:--XX:InitialRAMPercentage=10 -XX:MaxRAMPercentage=35}"
    mem_limit: 2g
    memswap_limit: 3g
    networks:
      - db_net

  db:
    image: postgres:16-alpine
    container_name: skyblockflipper-db
    restart: unless-stopped
    environment:
      # Postgres bootstrap
      POSTGRES_DB: ${POSTGRES_DB:-skyblock}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - db_net

volumes:
  postgres_data:

networks:
  app_net:
    driver: bridge
  db_net:
    driver: bridge
    internal: true
